<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">e<span>Shop</span></div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Fill in your details to get started</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="fields-row">
        <div class="field-group">
          <label for="firstName" class="field-label">First name</label>
          <input
            type="text"
            id="firstName"
            class="field-input"
            [class.field-input--error]="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched"
            formControlName="firstName"
            autocomplete="off"
            placeholder="First name"
          />
          <div
            *ngIf="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched"
            class="field-error"
          >
            <small *ngIf="registerForm.get('firstName')?.errors?.['required']">Required.</small>
          </div>
        </div>

        <div class="field-group">
          <label for="lastName" class="field-label">Last name</label>
          <input
            type="text"
            id="lastName"
            class="field-input"
            [class.field-input--error]="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched"
            formControlName="lastName"
            autocomplete="off"
            placeholder="Last name"
          />
          <div
            *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched"
            class="field-error"
          >
            <small *ngIf="registerForm.get('lastName')?.errors?.['required']">Required.</small>
          </div>
        </div>
      </div>

      <div class="field-group">
        <label for="email" class="field-label">Email</label>
        <input
          type="email"
          id="email"
          class="field-input"
          [class.field-input--error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
          formControlName="email"
          autocomplete="off"
          placeholder="you@example.com"
        />
        <div
          *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
          class="field-error"
        >
          <small *ngIf="registerForm.get('email')?.errors?.['required']">Email is required.</small>
          <small *ngIf="registerForm.get('email')?.errors?.['pattern']">Invalid email format.</small>
        </div>
      </div>

      <div class="field-group">
        <label for="username" class="field-label">Username</label>
        <input
          type="text"
          id="username"
          class="field-input"
          [class.field-input--error]="registerForm.get('username')?.invalid && registerForm.get('username')?.touched"
          formControlName="username"
          autocomplete="off"
          placeholder="Choose a username"
        />
        <div
          *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched"
          class="field-error"
        >
          <small *ngIf="registerForm.get('username')?.errors?.['required']">Username is required.</small>
        </div>
      </div>

      <div class="field-group">
        <label for="password" class="field-label">Password</label>
        <input
          type="password"
          id="password"
          class="field-input"
          [class.field-input--error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
          formControlName="password"
          autocomplete="off"
          placeholder="Create a password"
        />
        <div
          *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
          class="field-error"
        >
          <small *ngIf="registerForm.get('password')?.errors?.['required']">Password is required.</small>
          <small *ngIf="registerForm.get('password')?.errors?.['pattern']">
            Must include uppercase, lowercase, number, and special character.
          </small>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="registerForm.invalid || isSubmitting"
        class="auth-btn"
      >
        {{ isSubmitting ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login" class="auth-link">Sign in</a>
    </p>
  </div>
</div>
