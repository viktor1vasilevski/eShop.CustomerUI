<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">e<span>Shop</span></div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="field-group">
        <label for="username" class="field-label">Username</label>
        <input
          type="text"
          id="username"
          class="field-input"
          [class.field-input--error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          formControlName="username"
          autocomplete="off"
          placeholder="Enter your username"
        />
        <div
          *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          class="field-error"
        >
          <small *ngIf="loginForm.get('username')?.errors?.['required']">Username is required.</small>
        </div>
      </div>

      <div class="field-group">
        <label for="password" class="field-label">Password</label>
        <input
          type="password"
          id="password"
          class="field-input"
          [class.field-input--error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          formControlName="password"
          autocomplete="off"
          placeholder="Enter your password"
        />
        <div
          *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          class="field-error"
        >
          <small *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</small>
          <small *ngIf="loginForm.get('password')?.errors?.['pattern']">
            Must include uppercase, lowercase, number, and special character.
          </small>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || isSubmitting"
        class="auth-btn"
      >
        {{ isSubmitting ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/register" class="auth-link">Create one</a>
    </p>
  </div>
</div>
